// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

// Force targetSdkVersion to 34 so rnmapbox_maps uses com.mapbox.maps:android
// instead of com.mapbox.maps:android-ndk27 (which requires targetSdk >= 35).
// The NDK27 variant is only needed for Google Play 16KB page size compliance.
ext {
  targetSdkVersion = 34
  // Explicitly set Mapbox Maps version to avoid NDK27 variant selection
  RNMapboxMapsVersion = "11.15.2"
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven {
      url 'https://api.mapbox.com/downloads/v2/releases/maven'
      authentication { basic(org.gradle.authentication.http.BasicAuthentication) }
      credentials {
        username = 'mapbox'
        password = project.findProperty('MAPBOX_DOWNLOADS_TOKEN') ?: System.getenv('MAPBOX_DOWNLOADS_TOKEN')
      }
    }
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
