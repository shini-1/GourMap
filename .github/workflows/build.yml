name: 🚀 GourMap CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ─── Validate (runs on every push / PR) ───────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 TypeScript check
        run: npx tsc --noEmit

  # ─── EAS Preview Build — Android APK (push to main) ───────────────────────
  eas-preview:
    name: 🤖 EAS Preview Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true
          packager: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (preview APK)
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download preview APK from EAS
        if: success()
        run: |
          mkdir -p ./build
          echo "Fetching latest EAS build..."
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json --non-interactive)
          echo "Build info: $BUILD_INFO"
          ARTIFACT_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl // .[0].buildUrl // empty')
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "DEBUG: Full response:"
            echo "$BUILD_INFO" | jq '.'
            echo "ERROR: Could not extract artifact URL."
            exit 1
          fi
          echo "Downloading preview APK from: $ARTIFACT_URL"
          curl -L -H "Authorization: Bearer $EXPO_TOKEN" "$ARTIFACT_URL" -o ./build/app-preview.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload preview APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: preview-apk
          path: ./build/app-preview.apk
          retention-days: 30

  # ─── EAS Production Build — Android AAB (every push) ──────
  eas-production:
    name: 🏭 EAS Production Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (production AAB)
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download production AAB from EAS
        if: success()
        run: |
          mkdir -p ./build
          echo "Fetching latest EAS build..."
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json --non-interactive)
          echo "Build info: $BUILD_INFO"
          ARTIFACT_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl // .[0].buildUrl // empty')
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "DEBUG: Full response:"
            echo "$BUILD_INFO" | jq '.'
            echo "ERROR: Could not extract artifact URL."
            exit 1
          fi
          echo "Downloading production AAB from: $ARTIFACT_URL"
          curl -L -H "Authorization: Bearer $EXPO_TOKEN" "$ARTIFACT_URL" -o ./build/app-production.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload AAB to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: production-aab
          path: ./build/app-production.aab
          retention-days: 90

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v') && success()
        with:
          files: ./build/app-production.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
