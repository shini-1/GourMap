name: Build Test Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          eas-cache: true
          packager: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗 Build Web (Test Export)
        run: npx expo export --platform web

      - name: 🏗 Build Android (Test Prebuild)
        run: npx expo prebuild --platform android

      - name: 🚀 Build Android APK (EAS)
        if: github.event_name == 'push'
        run: eas build --profile production --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK from EAS
        if: github.event_name == 'push'
        run: |
          mkdir -p ./build
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading APK from: $APK_URL"
          curl -L -H "Authorization: Bearer $EXPO_TOKEN" "$APK_URL" -o ./build/app-production.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Upload APK Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-production
          path: ./build/app-production.apk
