name: Build Test Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗 Build Web (Test Export)
        run: npx expo export --platform web

      - name: 🏗 Build Android (Test Prebuild)
        run: npx expo prebuild --platform android

      # Note: For full EAS builds, secrets (EXPO_TOKEN) would be required.
      # This workflow validates that the project can be exported and prebuilt.