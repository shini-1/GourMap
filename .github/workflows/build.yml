name: 🚀 GourMap CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ─── Validate (runs on every push / PR) ───────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 TypeScript check
        run: npx tsc --noEmit

  # ─── EAS Preview Build — Android APK (push to main) ───────────────────────
  eas-preview:
    name: 🤖 EAS Preview Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true
          packager: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (preview APK)
        run: eas build --platform android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download preview APK from EAS
        if: success()
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p ./build
          echo "Waiting for preview build artifact..."
          for attempt in $(seq 1 30); do
            BUILD_INFO=$(eas build:list --platform android --limit 20 --json --non-interactive)
            BUILD_ENTRY=$(echo "$BUILD_INFO" | jq -r --arg sha "$GITHUB_SHA" --arg profile "preview" '.[] | select(.gitCommitHash == $sha and .buildProfile == $profile) | @json' | head -n 1)
            if [ -n "$BUILD_ENTRY" ]; then
              STATUS=$(echo "$BUILD_ENTRY" | jq -r '.status')
              ARTIFACT_URL=$(echo "$BUILD_ENTRY" | jq -r '.artifacts.buildUrl // .buildUrl // empty')
              echo "Preview build status: $STATUS"
              if [ "$STATUS" = "FINISHED" ] && [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
                echo "Downloading preview APK from: $ARTIFACT_URL"
                curl -L -H "Authorization: Bearer $EXPO_TOKEN" "$ARTIFACT_URL" -o ./build/app-preview.apk
                exit 0
              fi
            fi
            echo "Preview build not ready yet (attempt $attempt/30)..."
            sleep 30
          done
          echo "DEBUG: Full response:"
          echo "$BUILD_INFO" | jq '.'
          echo "ERROR: Could not extract preview artifact URL."
          exit 1

      - name: 📤 Upload preview APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: preview-apk
          path: ./build/app-preview.apk
          retention-days: 30

  # ─── EAS Production Build — Android APK (every push) ──────
  eas-production:
    name: 🏭 EAS Production Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (production APK)
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download production APK from EAS
        if: success()
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p ./build
          echo "Waiting for production build artifact..."
          for attempt in $(seq 1 30); do
            BUILD_INFO=$(eas build:list --platform android --limit 20 --json --non-interactive)
            BUILD_ENTRY=$(echo "$BUILD_INFO" | jq -r --arg sha "$GITHUB_SHA" --arg profile "production" '.[] | select(.gitCommitHash == $sha and .buildProfile == $profile) | @json' | head -n 1)
            if [ -n "$BUILD_ENTRY" ]; then
              STATUS=$(echo "$BUILD_ENTRY" | jq -r '.status')
              ARTIFACT_URL=$(echo "$BUILD_ENTRY" | jq -r '.artifacts.buildUrl // .buildUrl // empty')
              echo "Production build status: $STATUS"
              if [ "$STATUS" = "FINISHED" ] && [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
                echo "Downloading production APK from: $ARTIFACT_URL"
                curl -L -H "Authorization: Bearer $EXPO_TOKEN" "$ARTIFACT_URL" -o ./build/app-production.apk
                exit 0
              fi
            fi
            echo "Production build not ready yet (attempt $attempt/30)..."
            sleep 30
          done
          echo "DEBUG: Full response:"
          echo "$BUILD_INFO" | jq '.'
          echo "ERROR: Could not extract production artifact URL."
          exit 1

      - name: 📤 Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: production-apk
          path: ./build/app-production.apk
          retention-days: 90

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v') && success()
        with:
          files: ./build/app-production.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
