name: 🚀 GourMap CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ─── Validate (runs on every push / PR) ───────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 TypeScript check
        run: npx tsc --noEmit

  # ─── EAS Preview Build — Android APK (push to main) ───────────────────────
  eas-preview:
    name: 🤖 EAS Preview Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true
          packager: npm

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (preview APK)
        run: eas build --platform android --profile preview --non-interactive

  # ─── EAS Production Build — Android AAB (push to main or version tags) ──────
  eas-production:
    name: 🏭 EAS Production Build
    runs-on: ubuntu-latest
    needs: validate
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 EAS Build (production AAB)
        run: eas build --platform android --profile production --non-interactive
